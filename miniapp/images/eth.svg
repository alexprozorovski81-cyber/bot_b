<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0c0f1a"/>
    </linearGradient>
    <radialGradient id="gl" cx="65%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#gl)"/>
  <circle cx="590" cy="200" r="160" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.13"/>
  <circle cx="590" cy="200" r="118" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.08"/>
  <!-- Ethereum diamond (Ξ) -->
  <polygon points="590,60 650,200 590,240 530,200" fill="#a855f7" opacity="0.75"/>
  <polygon points="590,240 650,200 590,340 530,200" fill="#a855f7" opacity="0.45"/>
  <polygon points="590,60 590,240 530,200" fill="#c084fc" opacity="0.25"/>
  <polygon points="590,240 590,340 530,200" fill="#c084fc" opacity="0.15"/>
  <!-- Label chip -->
  <rect x="36" y="338" width="122" height="30" rx="15" fill="#a855f7" fill-opacity="0.12"/>
  <text x="97" y="358" font-family="Arial,sans-serif" font-size="13" font-weight="700"
        text-anchor="middle" fill="#a855f7" letter-spacing="1.5">ETHEREUM</text>
</svg>
