<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0c1018"/>
    </linearGradient>
    <radialGradient id="gl" cx="65%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#gl)"/>
  <circle cx="590" cy="200" r="160" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.13"/>
  <circle cx="590" cy="200" r="118" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.08"/>
  <circle cx="590" cy="200" r="76"  fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.05"/>
  <!-- Bitcoin ₿ symbol -->
  <text x="590" y="268" font-family="Georgia,'Times New Roman',serif" font-size="190" font-weight="bold"
        text-anchor="middle" fill="#f59e0b" opacity="0.88">₿</text>
  <!-- Glow dot -->
  <circle cx="590" cy="200" r="8" fill="#f59e0b" opacity="0.35"/>
  <!-- Label chip -->
  <rect x="36" y="338" width="118" height="30" rx="15" fill="#f59e0b" fill-opacity="0.12"/>
  <text x="95" y="358" font-family="Arial,sans-serif" font-size="13" font-weight="700"
        text-anchor="middle" fill="#f59e0b" letter-spacing="1.5">BITCOIN</text>
</svg>
