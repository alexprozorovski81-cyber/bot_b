  <line x1="482" y1="140" x2="556" y2="240" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <line x1="482" y1="200" x2="556" y2="120" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <line x1="482" y1="200" x2="556" y2="180" stroke="#22d3ee" stroke-width="1.5" opacity="0.25"/>
  <line x1="482" y1="200" x2="556" y2="240" stroke="#22d3ee" stroke-width="1.5" opacity="0.25"/>
  <line x1="482" y1="200" x2="556" y2="300" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <line x1="482" y1="260" x2="556" y2="240" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <line x1="482" y1="260" x2="556" y2="300" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>
  <!-- Connections L2→L3 -->
  <line x1="584" y1="120" x2="664" y2="155" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
  <line x1="584" y1="180" x2="664" y2="155" stroke="#06b6d4" stroke-width="1.5" opacity="0.35"/>
  <line x1="584" y1="180" x2="664" y2="245" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
  <line x1="584" y1="240" x2="664" y2="155" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
  <line x1="584" y1="240" x2="664" y2="245" stroke="#06b6d4" stroke-width="1.5" opacity="0.35"/>
  <line x1="584" y1="300" x2="664" y2="245" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
