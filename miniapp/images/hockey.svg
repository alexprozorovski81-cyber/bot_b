<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#080f18"/>
    </linearGradient>
    <radialGradient id="gl" cx="65%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#gl)"/>
  <circle cx="590" cy="200" r="160" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.12"/>
  <!-- Ice rink oval outline -->
  <ellipse cx="590" cy="220" rx="140" ry="90" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.2"/>
  <!-- Hockey stick 1 (left) -->
  <line x1="490" y1="100" x2="560" y2="240" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <path d="M560,240 Q580,270 610,265" fill="none" stroke="#0ea5e9" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  <!-- Hockey stick 2 (right, crossed) -->
  <line x1="690" y1="100" x2="620" y2="240" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <path d="M620,240 Q600,270 570,265" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <!-- Puck -->
  <ellipse cx="590" cy="285" rx="28" ry="12" fill="#1e3a4a" stroke="#0ea5e9" stroke-width="2" opacity="0.85"/>
  <!-- Snowflake decoration -->
  <line x1="590" y1="130" x2="590" y2="170" stroke="#7dd3fc" stroke-width="1.5" opacity="0.25"/>
  <line x1="569" y1="139" x2="611" y2="161" stroke="#7dd3fc" stroke-width="1.5" opacity="0.25"/>
  <line x1="569" y1="161" x2="611" y2="139" stroke="#7dd3fc" stroke-width="1.5" opacity="0.25"/>
  <!-- Label chip -->
  <rect x="36" y="338" width="108" height="30" rx="15" fill="#0ea5e9" fill-opacity="0.12"/>
  <text x="90" y="358" font-family="Arial,sans-serif" font-size="13" font-weight="700"
        text-anchor="middle" fill="#38bdf8" letter-spacing="1.5">ХОККЕЙ</text>
</svg>
