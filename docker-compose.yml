services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: predictbet
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: predictbet
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predictbet"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./miniapp:/app/miniapp

volumes:
  pg_data:
  redis_data:
